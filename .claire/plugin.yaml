name: navair
version: 1.0.0
description: "NAVAIR JSF stack domains and navair-dev agent persona — Java/Spring + Node/Vue + Jenkins + Oracle + MQ"

author:
  name: "CLAIRE-nav"
  url: "https://github.com/CLAIRE-nav"

type: domain

deps:
  - CLAIRE-plugins/plugin-java
  - CLAIRE-plugins/plugin-jenkins
  - CLAIRE-plugins/plugin-oracle

dependencies:
  system:
    - git
    - curl
    - mvn
    - npm
  claire:
    min: "0.2.0"

requirements:
  tools:
    - name: java
      version: ">=17"
      install: "brew install openjdk@17"
    - name: mvn
      install: "brew install maven"
    - name: node
      version: ">=18"
      install: "brew install node"

  tokens:
    - env: JENKINS_TOKEN
      description: "Jenkins API token — generate in Jenkins user settings"
    - env: ORACLE_PASSWORD
      description: "Oracle DB credentials for the JSF environment"

commands:
  - name: "jsf"
    script: "domain/commands/jsf.sh"
    description: "JSF stack operations: status | build [repo] | test [repo] | deploy [env]"
    args:
      - name: subcommand
        type: string
        required: true
        description: "Subcommand: status, build, test, deploy"
      - name: target
        type: string
        required: false
        description: "Target repo or environment"
